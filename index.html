            background: #1f5f9e;

        }
        .preview-iframe-wrap {

        }
        .code-toggle {
            background: #f7f9fd;
            padding: 8px 20px;
            border: none;
            border-bottom: 1px solid #e9edf4;
            width: 100%;
            text-align: left;
            font-size: 13px;
            font-weight: 500;
            color: #1f4970;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.15s;
        }
        .code-toggle:hover {
            background: #edf2fa;
        }
        .code-toggle::after {
            content: "▾";
            margin-left: auto;
            font-size: 14px;
            transition: 0.2s;
        }
        .code-toggle.open::after {
            transform: rotate(180deg);
        }
        .code-content {
            display: none;
            background: #1e1f29;
            padding: 16px;
            overflow-x: auto;
            border-top: 1px solid #2f3547;
        }

        { id: 'PRASQ16', html: `<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three-State Responsive Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
            text-align: center;
            font-weight: bold;
        }

        .container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Base Component Sizing & Styling */
        .header { background-color: #f07474; padding: 20px; }
        .main   { background-color: #ffffff; padding: 40px; flex-grow: 1; border: 1px solid #eaeaea; }
        .left   { background-color: #ffd166; padding: 30px; }
        .right  { background-color: #b6f08e; padding: 30px; }
        .footer { background-color: #62b6eb; padding: 20px; }

        .header { order: 1; }
        .main   { order: 2; }
        .left   { order: 3; }
        .right  { order: 4; }
        .footer { order: 5; }

        @media (min-width: 600px) and (max-width: 899px) {
            .container {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .header { width: 100%; order: 1; }
            .main   { width: 100%; order: 2; }
            .left   { width: 50%;  order: 3; }
            .right  { width: 50%;  order: 4; }
            .footer { width: 100%; order: 5; }
        }

        @media (min-width: 900px) {
            .container {
                flex-direction: row;
                flex-wrap: wrap;
            }
            .header { width: 100%; order: 1; }
            
            /* Columns sit horizontally side-by-side */
            .left   { width: 20%;  order: 2; height: calc(100vh - 120px); }
            .main   { width: 60%;  order: 3; height: calc(100vh - 120px); }
            .right  { width: 20%;  order: 4; height: calc(100vh - 120px); }
            
            .footer { width: 100%; order: 5; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">Header</header>
        <main class="main">Main</main>
        <aside class="left">Left</aside>
        <aside class="right">Right</aside>
        <footer class="footer">Footer</footer>
    </div>

</body>
</html>` },

    const grid = document.getElementById('fileGrid');

    fileData.forEach((file, index) => {
        const card = document.createElement('div');
        card.className = 'file-card';

        // header
        const header = document.createElement('div');
        header.className = 'file-header';
        header.innerHTML = `
            <h2>📄 ${file.id} <span>#${index+1}</span></h2>
            <span class="badge">preview + source</span>
        `;

        // preview iframe
        const previewWrap = document.createElement('div');
        previewWrap.className = 'preview-iframe-wrap';
        const iframe = document.createElement('iframe');
        iframe.srcdoc = file.html;
        iframe.title = file.id;
        previewWrap.appendChild(iframe);

        // code toggle button
        const toggleBtn = document.createElement('button');
        toggleBtn.className = 'code-toggle';
        toggleBtn.textContent = `📜 View source code (${file.id})`;
        toggleBtn.setAttribute('aria-expanded', 'false');

        // code content
        const codeDiv = document.createElement('div');
        codeDiv.className = 'code-content';
        const pre = document.createElement('pre');
        pre.textContent = file.html;
        codeDiv.appendChild(pre);

        // toggle logic
        toggleBtn.addEventListener('click', () => {
            const isOpen = codeDiv.classList.toggle('open');
            toggleBtn.classList.toggle('open');
            toggleBtn.setAttribute('aria-expanded', isOpen);
        });

        // assemble card
        card.appendChild(header);
        card.appendChild(previewWrap);
        card.appendChild(toggleBtn);
        card.appendChild(codeDiv);
        grid.appendChild(card);
    });
</script>

</body>
